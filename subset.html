<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hydrofabric Subsetter</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/pmtiles@4.0.1/dist/pmtiles.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js"></script>
<style>
:root {
  --bg:#0a0e17; --surface:#111827; --surface2:#1e293b; --border:#334155;
  --text:#e2e8f0; --text-dim:#94a3b8; --accent:#38bdf8; --accent-dim:#0ea5e9;
  --selected:#ee3377; --upstream:#ee7733; --success:#10b981; --danger:#ef4444;
  --radius:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
#map{position:absolute;inset:0;z-index:0}
#sidebar{
  position:absolute;top:16px;left:16px;z-index:10;width:340px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  display:flex;flex-direction:column;max-height:calc(100vh - 32px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden;
}
#sidebar header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
#sidebar header h1{font-size:15px;font-weight:700;letter-spacing:.5px;color:var(--accent);font-family:'JetBrains Mono',monospace}
#sidebar header p{font-size:12px;color:var(--text-dim);margin-top:4px;line-height:1.5}
#controls{padding:16px 20px;flex-shrink:0}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.field input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px}
.field input:focus{outline:none;border-color:var(--accent)}
.field input::placeholder{color:#475569}
.btn-row{display:flex;gap:8px;margin-top:16px}
button{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
#btn-subset{background:var(--accent-dim);color:#000;border-color:var(--accent)}
#btn-subset:hover{background:var(--accent)}
#btn-subset:disabled{opacity:.4;cursor:not-allowed;background:var(--surface2);color:var(--text-dim);border-color:var(--border)}
#btn-clear{background:var(--surface2);color:var(--text-dim);flex:0 0 auto;width:80px}
#btn-clear:hover{color:var(--text);border-color:var(--text-dim)}
#selection-info{padding:12px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;line-height:1.6;display:none}
#selection-info .count{color:var(--upstream);font-weight:600;font-size:14px}
#selection-info .outlet{color:var(--selected);font-weight:600}
#log-container{flex:1;overflow-y:auto;border-top:1px solid var(--border);padding:12px 20px;min-height:80px}
#log{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:var(--text-dim);white-space:pre-wrap;word-break:break-all}
#log .info{color:var(--accent)} #log .success{color:var(--success)}
#log .error{color:var(--danger)} #log .step{color:var(--upstream)}
#progress-bar{height:3px;background:var(--surface2);overflow:hidden;flex-shrink:0}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#22d3ee);transition:width .3s}
.checkbox-field{display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer}
.checkbox-field input[type="checkbox"]{width:14px;height:14px;cursor:pointer;accent-color:var(--accent)}
.checkbox-field span{font-size:12px;color:var(--text-dim)}
</style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
  <header>
    <h1>&#9651; HYDROFABRIC SUBSETTER</h1>
    <p>Click a catchment on the map or enter an ID. Upstream network is auto-selected, then download a subset GeoPackage.</p>
  </header>
  <div id="controls">
    <div class="field">
      <label>Catchment ID</label>
      <input id="input-catid" type="text" placeholder="e.g. cat-486931" spellcheck="false"/>
    </div>
    <label class="checkbox-field">
      <input type="checkbox" id="chk-include-outlet" checked/>
      <span>Include outlet nexus</span>
    </label>
    <div class="btn-row">
      <button id="btn-subset" disabled>Subset &amp; Download</button>
      <button id="btn-clear">Clear</button>
    </div>
  </div>
  <div id="selection-info"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="log-container"><div id="log"></div></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const S3_PARQUET = 'https://communityhydrofabric.s3.us-east-1.amazonaws.com/hydrofabrics/community/parquet';
const S3_MAP = 'https://communityhydrofabric.s3.us-east-1.amazonaws.com/map';
const NETWORK_GRAPH_URL = `${S3_PARQUET}/network_graph.json`;

const PARQUET_URLS = {
  'divides':                `${S3_PARQUET}/divides.parquet`,
  'divide-attributes':      `${S3_PARQUET}/divide-attributes.parquet`,
  'flowpaths':              `${S3_PARQUET}/flowpaths.parquet`,
  'flowpath-attributes':    `${S3_PARQUET}/flowpath-attributes.parquet`,
  'flowpath-attributes-ml': `${S3_PARQUET}/flowpath-attributes-ml.parquet`,
  'hydrolocations':         `${S3_PARQUET}/hydrolocations.parquet`,
  'nexus':                  `${S3_PARQUET}/nexus.parquet`,
  'pois':                   `${S3_PARQUET}/pois.parquet`,
  'lakes':                  `${S3_PARQUET}/lakes.parquet`,
  'network':                `${S3_PARQUET}/network.parquet`,
};

// ============================================================
// STATE
// ============================================================
let networkGraph = null;
let adjacency = null;
let outletCatId = null;
let upstreamCatIds = [];
let upstreamNumericIds = new Set();
let map = null;

let hp = null;
let compressors = null;
const fileHandleCache = {};

// ============================================================
// LOGGING
// ============================================================
const logEl = document.getElementById('log');
function log(msg, cls = '') {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.parentElement.scrollTop = logEl.parentElement.scrollHeight;
}
function setProgress(pct) {
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ============================================================
// NETWORK GRAPH
// ============================================================
async function loadNetworkGraph() {
  log('Loading network graph...', 'info');
  const t0 = performance.now();
  const resp = await fetch(NETWORK_GRAPH_URL);
  if (!resp.ok) throw new Error(`Failed: ${resp.status}`);
  networkGraph = await resp.json();
  log(`  ${networkGraph.meta.total_edges} edges in ${((performance.now()-t0)/1000).toFixed(1)}s`, 'success');

  const upstream = new Map();
  for (const [ft, fn, tt, tn] of networkGraph.edges) {
    if ((ft === 0 || ft === 2) && (tt === 1 || tt === 3 || tt === 4)) {
      if (!upstream.has(tn)) upstream.set(tn, new Set());
      upstream.get(tn).add(fn);
    }
  }
  adjacency = upstream;
  log(`  Adjacency: ${upstream.size} nodes`, 'success');
}

function getUpstreamIds(outletNumeric, includeOutlet = true) {
  const visited = new Set();
  const queue = [outletNumeric];
  if (includeOutlet) visited.add(outletNumeric);
  while (queue.length > 0) {
    const cur = queue.shift();
    const parents = adjacency.get(cur);
    if (!parents) continue;
    for (const p of parents) {
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
    }
  }
  return visited;
}

// ============================================================
// HYPARQUET
// ============================================================
async function initHyparquet() {
  if (hp) return;
  log('Loading hyparquet...', 'info');
  const t0 = performance.now();

  hp = await import('https://cdn.jsdelivr.net/npm/hyparquet/+esm');

  try {
    const hpc = await import('https://cdn.jsdelivr.net/npm/hyparquet-compressors/+esm');
    compressors = hpc.compressors;
    log(`  hyparquet + compressors ready (${((performance.now()-t0)/1000).toFixed(1)}s)`, 'success');
  } catch (e) {
    log(`  hyparquet ready, compressors unavailable (${e.message})`, 'info');
    compressors = undefined;
  }
}

async function getFileHandle(url) {
  if (!fileHandleCache[url]) {
    fileHandleCache[url] = await hp.asyncBufferFromUrl({ url });
  }
  return fileHandleCache[url];
}

/**
 * Read rows from a remote parquet file using hyparquet's $in filter.
 * Row groups whose min/max stats don't overlap the $in values are
 * skipped entirely (no range request made).
 */
const _td = new TextDecoder();

async function readParquetFiltered(url, filterCol, idArray) {
  const file = await getFileHandle(url);
  const opts = {
    file,
    geoparquet: false,
    rowFormat: 'object',
    utf8: false, // keep BYTE_ARRAY as Uint8Array so binary geom isn't corrupted by UTF-8 decoding
    filter: { [filterCol]: { $in: idArray } },
  };
  if (compressors) opts.compressors = compressors;

  const rows = await hp.parquetReadObjects(opts);
  return rows.map(row => {
    const out = {};
    for (const [k, v] of Object.entries(row)) {
      if (typeof v === 'bigint') {
        out[k] = Number(v);
      } else if (v instanceof Uint8Array && k !== 'geom' && k !== 'geometry') {
        // Non-geom BYTE_ARRAY columns are text — decode them back to strings
        out[k] = _td.decode(v);
      } else {
        out[k] = v;
      }
    }
    return out;
  });
}

// ============================================================
// MAP
// ============================================================
function initMap() {
  const protocol = new pmtiles.Protocol({ metadata: true });
  maplibregl.addProtocol('pmtiles', protocol.tile);

  const darkStyle = `${S3_MAP}/styles/dark-style.json`;
  const lightStyle = `${S3_MAP}/styles/light-style.json`;
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  map = new maplibregl.Map({
    container: 'map',
    style: prefersDark ? darkStyle : lightStyle,
    center: [-96, 40],
    zoom: 4,
  });

  map.on('load', () => {
    map.on('click', 'catchments', (e) => {
      if (e.features && e.features.length > 0) {
        const catId = e.features[0].properties.divide_id;
        if (catId) selectOutlet(catId);
      }
    });
    map.on('mouseenter', 'catchments', () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', 'catchments', () => { map.getCanvas().style.cursor = ''; });
    log('Map loaded. Zoom in to see catchments, then click one.', 'success');
  });
}

function updateMapFilters() {
  if (!map || !map.isStyleLoaded()) return;
  if (!outletCatId) {
    map.setFilter('selected-catchments', ['any', ['in', 'divide_id', '']]);
    map.setFilter('upstream-catchments', ['any', ['in', 'divide_id', '']]);
    return;
  }
  map.setFilter('selected-catchments', ['any', ['in', 'divide_id', outletCatId]]);
  const upstreamList = upstreamCatIds.filter(id => id !== outletCatId);
  if (upstreamList.length > 0) {
    map.setFilter('upstream-catchments', ['any', ['in', 'divide_id', ...upstreamList]]);
  } else {
    map.setFilter('upstream-catchments', ['any', ['in', 'divide_id', '']]);
  }
}

// ============================================================
// SELECTION
// ============================================================
async function selectOutlet(catId) {
  if (!catId.startsWith('cat-')) catId = 'cat-' + catId.replace(/^(cat-?)/, '');
  outletCatId = catId;
  document.getElementById('input-catid').value = catId;

  const numeric = parseInt(catId.split('-')[1]);
  const includeOutlet = document.getElementById('chk-include-outlet').checked;

  log(`\nSelected: ${catId}`, 'step');
  const t0 = performance.now();
  upstreamNumericIds = getUpstreamIds(numeric, includeOutlet);
  upstreamCatIds = Array.from(upstreamNumericIds).map(n => `cat-${n}`);
  log(`  ${upstreamNumericIds.size} upstream catchments (${(performance.now()-t0).toFixed(0)}ms)`, 'success');

  const info = document.getElementById('selection-info');
  info.style.display = 'block';
  info.innerHTML = `Outlet: <span class="outlet">${catId}</span><br>Upstream: <span class="count">${upstreamNumericIds.size}</span> catchments`;

  document.getElementById('btn-subset').disabled = false;
  updateMapFilters();
}

// ============================================================
// SUBSET & DOWNLOAD
//
// Table order and inter-table dependencies match the Python
// subsetting logic in subset_table() / create_subset_gpkg():
//
//   divides            -> filter by divide_id using catIds
//   divide-attributes  -> filter by divide_id from subset divides
//   flowpath-attributes    -> filter by id using wbIds
//   flowpath-attributes-ml -> filter by id using wbIds
//   flowpaths          -> filter by id using wbIds
//   hydrolocations     -> filter by id using wbIds
//   nexus              -> filter by id using nexIds + flowpath toids
//   pois               -> filter by id using wbIds
//   lakes              -> filter by poi_id from subset pois
//   network            -> filter by id using the full upstream id set
// ============================================================
async function subsetAndDownload() {
  if (!outletCatId || upstreamNumericIds.size === 0) return;
  const btn = document.getElementById('btn-subset');
  btn.disabled = true;
  logEl.innerHTML = '';
  setProgress(0);

  try {
    const nums = Array.from(upstreamNumericIds);
    log(`Subsetting ${nums.length} catchments from ${outletCatId}`, 'step');

    await initHyparquet();

    // Build ID arrays matching Python's upstream_ids prefixing
    const catIds = nums.map(n => `cat-${n}`);
    const wbIds  = nums.map(n => `wb-${n}`);
    const nexIds = nums.map(n => `nex-${n}`);

    // The Python subset_table passes the same ids list to every table.
    // The SQL WHERE key_name IN (...) naturally ignores non-matching prefixes.
    // We replicate this by building the right ID list per table, matching
    // the column each table actually filters on.

    // allTableData stores { rows, url } per table so buildGeoPackage can
    // fetch parquet schema even when a table has 0 matching rows.
    const allTableData = {};
    const totalSteps = 12; // 10 tables + gpkg build + download
    let step = 0;

    async function doTable(name, url, filterCol, ids) {
      step++;
      setProgress((step / totalSteps) * 100);
      log(`  ${name}...`, 'info');
      const t0 = performance.now();
      try {
        const rows = await readParquetFiltered(url, filterCol, ids);
        allTableData[name] = { rows, url };
        log(`    ${rows.length} rows (${((performance.now()-t0)/1000).toFixed(1)}s)`, 'success');
      } catch (err) {
        log(`    Error: ${err.message}`, 'error');
        allTableData[name] = { rows: [], url };
      }
    }

    // 1. divides — filter by divide_id with cat- IDs
    await doTable('divides', PARQUET_URLS['divides'], 'divide_id', catIds);

    // 2. divide-attributes — Python pulls divide_id from already-subset divides
    const divideAttrIds = (allTableData['divides']?.rows || []).map(r => r.divide_id).filter(Boolean);
    await doTable('divide-attributes', PARQUET_URLS['divide-attributes'], 'divide_id',
      divideAttrIds.length > 0 ? divideAttrIds : catIds);

    // 3. flowpath-attributes — filter by id with wb- IDs
    await doTable('flowpath-attributes', PARQUET_URLS['flowpath-attributes'], 'id', wbIds);

    // 4. flowpath-attributes-ml — filter by id with wb- IDs
    await doTable('flowpath-attributes-ml', PARQUET_URLS['flowpath-attributes-ml'], 'id', wbIds);

    // 5. flowpaths — filter by id with wb- IDs
    await doTable('flowpaths', PARQUET_URLS['flowpaths'], 'id', wbIds);

    // 6. hydrolocations — filter by id with wb- IDs
    await doTable('hydrolocations', PARQUET_URLS['hydrolocations'], 'id', wbIds);

    // 7. nexus — Python: ids + toid from already-subset flowpaths
    //    The base ids include nex- prefixed IDs, plus toid values from flowpaths
    const fpToids = (allTableData['flowpaths']?.rows || []).map(r => r.toid).filter(Boolean);
    const allNexIds = [...new Set([...nexIds, ...fpToids])];
    await doTable('nexus', PARQUET_URLS['nexus'], 'id', allNexIds);

    // 8. pois — filter by id with wb- IDs
    await doTable('pois', PARQUET_URLS['pois'], 'id', wbIds);

    // 9. lakes — Python: gets poi_id from already-subset pois table
    const poiIds = (allTableData['pois']?.rows || []).map(r => r.poi_id).filter(x => x != null);
    if (poiIds.length > 0) {
      await doTable('lakes', PARQUET_URLS['lakes'], 'poi_id', poiIds);
    } else {
      step++;
      setProgress((step / totalSteps) * 100);
      // Store url so buildGeoPackage can still create the empty table with correct schema
      allTableData['lakes'] = { rows: [], url: PARQUET_URLS['lakes'] };
      log('  lakes... 0 rows (no poi_ids)', '');
    }

    // 10. network — id column has wb- and nex- prefixed values; cat-X == wb-X
    await doTable('network', PARQUET_URLS['network'], 'id', [...wbIds, ...allNexIds]);

    // Build GeoPackage
    step++;
    setProgress((step / totalSteps) * 100);
    log('Building GeoPackage...', 'step');
    const gpkgBlob = await buildGeoPackage(allTableData);

    setProgress(100);
    const filename = `${outletCatId}_subset.gpkg`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(gpkgBlob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    log(`Downloaded ${filename} (${(gpkgBlob.size/1024/1024).toFixed(1)} MB)`, 'success');
  } catch (err) {
    log(`FATAL: ${err.message}`, 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

// ============================================================
// GEOMETRY HELPERS
// Convert any value (Uint8Array, ArrayBuffer, binary string) to Uint8Array
// ============================================================
function _ensureBytes(v) {
  if (v instanceof Uint8Array) return v;
  if (v instanceof ArrayBuffer) return new Uint8Array(v);
  if (v && v.buffer instanceof ArrayBuffer) return new Uint8Array(v.buffer, v.byteOffset, v.byteLength);
  if (typeof v === 'string') {
    // hyparquet returns BYTE_ARRAY columns as JS strings — convert char-by-char
    const b = new Uint8Array(v.length);
    for (let i = 0; i < v.length; i++) b[i] = v.charCodeAt(i) & 0xff;
    return b;
  }
  return null;
}

// Extract [minx, miny, maxx, maxy] from a ring (array of sequential x,y doubles)
function _ringBbox(dv, off, n, le) {
  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
  for (let i = 0; i < n; i++, off += 16) {
    const x = dv.getFloat64(off, le), y = dv.getFloat64(off+8, le);
    if (x < x0) x0=x; if (x > x1) x1=x;
    if (y < y0) y0=y; if (y > y1) y1=y;
  }
  return [x0, y0, x1, y1];
}

// Extract [minx, miny, maxx, maxy] from WKB bytes
function wkbBbox(bytes) {
  if (!bytes || bytes.length < 5) return null;
  try {
    const le = bytes[0] === 1;
    const dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
    const gt = dv.getUint32(1, le) & 0xffff;
    if (gt === 1) { // POINT
      const x = dv.getFloat64(5, le), y = dv.getFloat64(13, le);
      return isFinite(x) && isFinite(y) ? [x, y, x, y] : null;
    }
    if (gt === 2) { // LINESTRING
      const n = dv.getUint32(5, le);
      return _ringBbox(dv, 9, n, le);
    }
    if (gt === 3) { // POLYGON
      const nr = dv.getUint32(5, le);
      if (!nr) return null;
      const n = dv.getUint32(9, le);
      return _ringBbox(dv, 13, n, le);
    }
    if (gt >= 4 && gt <= 7) { // MULTI* / GEOMETRYCOLLECTION
      const ng = dv.getUint32(5, le);
      let bb = null, off = 9;
      for (let g = 0; g < ng; g++) {
        const sle = bytes[off] === 1; off++;
        const st = dv.getUint32(off, sle) & 0xffff; off += 4;
        let sb = null;
        if (st === 1) {
          const x=dv.getFloat64(off,sle), y=dv.getFloat64(off+8,sle);
          sb = [x, y, x, y]; off += 16;
        } else if (st === 2) {
          const n = dv.getUint32(off, sle); off += 4;
          sb = _ringBbox(dv, off, n, sle); off += n*16;
        } else if (st === 3) {
          const nr2 = dv.getUint32(off, sle); off += 4;
          if (nr2 > 0) {
            const n = dv.getUint32(off, sle); off += 4;
            sb = _ringBbox(dv, off, n, sle); off += n*16;
            for (let r = 1; r < nr2; r++) { const rn = dv.getUint32(off, sle); off += 4+rn*16; }
          }
        }
        if (sb) bb = bb ? [Math.min(bb[0],sb[0]),Math.min(bb[1],sb[1]),Math.max(bb[2],sb[2]),Math.max(bb[3],sb[3])] : sb;
      }
      return bb;
    }
    return null;
  } catch(e) { return null; }
}

// Merge two [minx,miny,maxx,maxy] extents
function mergeBbox(a, b) {
  if (!a) return b; if (!b) return a;
  return [Math.min(a[0],b[0]), Math.min(a[1],b[1]), Math.max(a[2],b[2]), Math.max(a[3],b[3])];
}

// Wrap raw WKB bytes in a GeoPackage geometry blob (GP header + optional bbox envelope + WKB)
// GP blob format: http://www.geopackage.org/spec/#gpb_format
function toGpkgBlob(v, srsId) {
  const wkb = _ensureBytes(v);
  if (!wkb || !wkb.length) return null;
  // Already a GP blob (magic bytes 'G','P')?
  if (wkb[0] === 0x47 && wkb[1] === 0x50) return wkb;

  const bbox = wkbBbox(wkb);
  // flags: bit0=little-endian=1, bits1-3=envelope type (1=bbox, 0=none)
  // envelope type 1 = minx,maxx,miny,maxy (4x float64 = 32 bytes)
  const hLen = bbox ? 40 : 8;
  const hdr = new Uint8Array(hLen);
  hdr[0] = 0x47; hdr[1] = 0x50; hdr[2] = 0x00;
  hdr[3] = bbox ? 0x03 : 0x01; // 0x03 = le + envelope type 1; 0x01 = le + no envelope
  const hdv = new DataView(hdr.buffer);
  hdv.setInt32(4, srsId, true); // SRS ID little-endian
  if (bbox) {
    hdv.setFloat64(8,  bbox[0], true); // minx
    hdv.setFloat64(16, bbox[2], true); // maxx
    hdv.setFloat64(24, bbox[1], true); // miny
    hdv.setFloat64(32, bbox[3], true); // maxy
  }
  const out = new Uint8Array(hLen + wkb.length);
  out.set(hdr); out.set(wkb, hLen);
  return out;
}

// ============================================================
// GEOPACKAGE BUILDER
// ============================================================
async function buildGeoPackage(tableData) {
  const SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/${f}`
  });
  const db = new SQL.Database();

  db.run(`
    CREATE TABLE gpkg_spatial_ref_sys (
      srs_name TEXT NOT NULL, srs_id INTEGER NOT NULL PRIMARY KEY,
      organization TEXT NOT NULL, organization_coordsys_id INTEGER NOT NULL,
      definition TEXT NOT NULL, description TEXT
    );
    INSERT INTO gpkg_spatial_ref_sys VALUES
      ('NAD83 / Conus Albers',5070,'EPSG',5070,'PROJCS["NAD83 / Conus Albers",GEOGCS["NAD83",DATUM["North_American_Datum_1983",SPHEROID["GRS 1980",6378137,298.257222101]],PRIMEM["Greenwich",0],UNIT["degree",0.0174532925199433]],PROJECTION["Albers_Conic_Equal_Area"],PARAMETER["latitude_of_center",23],PARAMETER["longitude_of_center",-96],PARAMETER["standard_parallel_1",29.5],PARAMETER["standard_parallel_2",45.5],PARAMETER["false_easting",0],PARAMETER["false_northing",0],UNIT["metre",1]]',NULL),
      ('WGS 84',4326,'EPSG',4326,'GEOGCS["WGS 84",DATUM["WGS_1984",SPHEROID["WGS 84",6378137,298.257223563]],PRIMEM["Greenwich",0],UNIT["degree",0.0174532925199433]]',NULL),
      ('Undefined cartesian',-1,'NONE',-1,'undefined',NULL),
      ('Undefined geographic',0,'NONE',0,'undefined',NULL);
    CREATE TABLE gpkg_contents (
      table_name TEXT NOT NULL PRIMARY KEY, data_type TEXT NOT NULL,
      identifier TEXT, description TEXT DEFAULT '',
      last_change DATETIME DEFAULT (strftime('%Y-%m-%dT%H:%M:%fZ','now')),
      min_x DOUBLE, min_y DOUBLE, max_x DOUBLE, max_y DOUBLE,
      srs_id INTEGER REFERENCES gpkg_spatial_ref_sys(srs_id)
    );
    CREATE TABLE gpkg_geometry_columns (
      table_name TEXT NOT NULL, column_name TEXT NOT NULL,
      geometry_type_name TEXT NOT NULL, srs_id INTEGER NOT NULL,
      z TINYINT NOT NULL, m TINYINT NOT NULL,
      CONSTRAINT pk_gc PRIMARY KEY (table_name, column_name)
    );
    CREATE TABLE gpkg_ogr_contents (table_name TEXT NOT NULL PRIMARY KEY, feature_count INTEGER);
    CREATE TABLE gpkg_extensions (
      table_name TEXT, column_name TEXT, extension_name TEXT NOT NULL,
      definition TEXT NOT NULL, scope TEXT NOT NULL,
      CONSTRAINT ge_tce UNIQUE (table_name, column_name, extension_name)
    );
    CREATE TABLE gpkg_tile_matrix_set (
      table_name TEXT NOT NULL PRIMARY KEY, srs_id INTEGER NOT NULL,
      min_x DOUBLE NOT NULL, min_y DOUBLE NOT NULL,
      max_x DOUBLE NOT NULL, max_y DOUBLE NOT NULL
    );
    CREATE TABLE gpkg_tile_matrix (
      table_name TEXT NOT NULL, zoom_level INTEGER NOT NULL,
      matrix_width INTEGER NOT NULL, matrix_height INTEGER NOT NULL,
      tile_width INTEGER NOT NULL, tile_height INTEGER NOT NULL,
      pixel_x_size DOUBLE NOT NULL, pixel_y_size DOUBLE NOT NULL,
      CONSTRAINT pk_ttm PRIMARY KEY (table_name, zoom_level)
    );
    PRAGMA application_id = 1196444487;
    PRAGMA user_version = 10200;
  `);

  // Geometry type per feature table (matches working.gpkg gpkg_geometry_columns)
  const GEOM_TYPE = {
    divides: 'POLYGON',
    flowpaths: 'GEOMETRY',
    nexus: 'POINT',
    hydrolocations: 'POINT',
    lakes: 'POINT',
  };
  const geomTables = new Set(Object.keys(GEOM_TYPE));

  // Hardcoded column definitions for tables that may have 0 matching rows,
  // taken directly from template.sql to ensure schema consistency.
  // fid is excluded here — it is prepended as PRIMARY KEY AUTOINCREMENT below.
  const EMPTY_TABLE_COLS = {
    'hydrolocations': '"poi_id" INTEGER,"id" TEXT,"nex_id" TEXT,"hf_id" REAL,"hl_link" TEXT,"hl_reference" TEXT,"hl_uri" TEXT,"hl_source" TEXT,"hl_x" REAL,"hl_y" REAL,"vpuid" TEXT,"geom" BLOB',
    'pois':           '"poi_id" INTEGER,"id" TEXT,"nex_id" TEXT,"vpuid" TEXT',
    'lakes':          '"geom" BLOB,"lake_id" REAL,"LkArea" REAL,"LkMxE" REAL,"WeirC" REAL,"WeirL" REAL,"OrificeC" REAL,"OrificeA" REAL,"OrificeE" REAL,"WeirE" REAL,"ifd" REAL,"Dam_Length" REAL,"domain" TEXT,"poi_id" INTEGER,"hf_id" REAL,"reservoir_index_AnA" REAL,"reservoir_index_Extended_AnA" REAL,"reservoir_index_GDL_AK" REAL,"reservoir_index_Medium_Range" REAL,"reservoir_index_Short_Range" REAL,"res_id" TEXT,"vpuid" TEXT,"lake_x" REAL,"lake_y" REAL',
  };

  for (const [tableName, entry] of Object.entries(tableData)) {
    // entry is { rows, url } from doTable
    const rows = Array.isArray(entry) ? entry : (entry?.rows ?? []);

    const hasGeom = geomTables.has(tableName);

    let columns, colDefs, geomCol;
    if (rows.length > 0) {
      columns = Object.keys(rows[0]);
      geomCol = (hasGeom && columns.find(c => c === 'geom' || c === 'geometry')) || null;
      colDefs = columns.map(c => {
        if (c === geomCol) return `"${c}" BLOB`;
        const sample = rows[0][c];
        if (typeof sample === 'number') return Number.isInteger(sample) ? `"${c}" INTEGER` : `"${c}" REAL`;
        return `"${c}" TEXT`;
      }).join(', ');
    } else if (EMPTY_TABLE_COLS[tableName]) {
      colDefs = EMPTY_TABLE_COLS[tableName];
      columns = colDefs.split(',').map(d => d.match(/"([^"]+)"/)[1]);
      geomCol = hasGeom ? (columns.find(c => c === 'geom' || c === 'geometry') || null) : null;
    } else {
      continue;
    }

    const hasFid = columns.includes('fid');
    db.run(`CREATE TABLE "${tableName}" (${hasFid ? colDefs : `fid INTEGER PRIMARY KEY AUTOINCREMENT, ${colDefs}`})`);

    let extent = null;
    if (rows.length > 0) {
      const placeholders = columns.map(() => '?').join(',');
      const colStr = columns.map(c => `"${c}"`).join(',');
      const stmt = db.prepare(`INSERT INTO "${tableName}" (${colStr}) VALUES (${placeholders})`);
      for (const row of rows) {
        const vals = columns.map(c => {
          const v = row[c];
          if (v == null) return null;
          if (c === geomCol) {
            const gpb = toGpkgBlob(v, 5070);
            if (gpb) {
              const envType = (gpb[3] & 0x0E) >> 1;
              const wkbOff = 8 + [0,32,48,48,64][envType];
              extent = mergeBbox(extent, wkbBbox(gpb.subarray(wkbOff)));
            }
            return gpb;
          }
          return v;
        });
        try { stmt.run(vals); } catch(e) {}
      }
      stmt.free();
    }

    const dataType = hasGeom ? 'features' : 'attributes';
    if (hasGeom && extent) {
      db.run(
        `INSERT INTO gpkg_contents (table_name,data_type,identifier,description,min_x,min_y,max_x,max_y,srs_id) VALUES (?,?,?,'',?,?,?,?,?)`,
        [tableName, dataType, tableName, extent[0], extent[1], extent[2], extent[3], 5070]
      );
    } else {
      db.run(`INSERT INTO gpkg_contents (table_name,data_type,identifier,srs_id) VALUES (?,?,?,?)`,
        [tableName, dataType, tableName, hasGeom ? 5070 : 0]);
    }
    if (hasGeom) {
      db.run(`INSERT INTO gpkg_geometry_columns VALUES (?,?,?,5070,0,0)`,
        [tableName, geomCol, GEOM_TYPE[tableName] || 'GEOMETRY']);
    }
    db.run(`INSERT INTO gpkg_ogr_contents VALUES (?,?)`, [tableName, rows.length]);
    log(`  gpkg: ${tableName} (${rows.length} rows)`, '');
  }

  const data = db.export();
  db.close();
  return new Blob([data], { type: 'application/geopackage+sqlite3' });
}
